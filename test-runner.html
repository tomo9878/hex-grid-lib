<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VLE — ホワイトボックステスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0e1a; color: #ddd; font-family: monospace; font-size: 13px; padding: 16px; }
h1  { color: #ffd700; margin-bottom: 4px; font-size: 16px; }
.subtitle { color: #666; font-size: 11px; margin-bottom: 16px; }
#summary { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; }
.sum-pass { background: #0a2a0a; border: 1px solid #0f0; color: #0f0; }
.sum-fail { background: #2a0a0a; border: 1px solid #f66; color: #f66; }
.section  { margin-bottom: 6px; padding: 4px 10px; background: #1a1a2e; border-radius: 4px;
             font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .06em; }
.result   { display: flex; gap: 8px; align-items: baseline; padding: 3px 8px;
             border-radius: 3px; margin: 2px 0; font-size: 12px; }
.result.pass { background: #0a2a0a; border-left: 3px solid #0f0; color: #cfc; }
.result.fail { background: #2a0a0a; border-left: 3px solid #f66; color: #fcc; }
.result .badge { font-weight: bold; flex-shrink: 0; min-width: 40px; }
.result.pass .badge { color: #0f0; }
.result.fail .badge { color: #f66; }
.result .msg  { flex: 1; }
.result .detail { color: #888; font-size: 11px; }
#loading { color: #666; padding: 20px 0; }
</style>
</head>
<body>
<h1>Vive l'Empereur — ホワイトボックステスト</h1>
<div class="subtitle">ゲームロジック関数を直接呼び出して期待値を検証します</div>
<div id="loading">ゲームをロード中…</div>
<div id="summary" style="display:none"></div>
<div id="results"></div>

<!-- ゲームを不可視iframeでロード -->
<iframe id="game-frame" src="index.html"
  style="position:fixed;left:-9999px;width:1280px;height:900px;opacity:0;pointer-events:none">
</iframe>

<script>
// ============================================================
// テストフレームワーク
// ============================================================
const resultsEl = document.getElementById('results');
let passCount = 0, failCount = 0;
let currentSection = '';

function section(label) {
  currentSection = label;
  const div = document.createElement('div');
  div.className = 'section';
  div.textContent = label;
  resultsEl.appendChild(div);
}

function test(name, fn) {
  try {
    fn();
    passCount++;
    addResult('pass', name);
  } catch (e) {
    failCount++;
    addResult('fail', name, e.message);
  }
}

function addResult(status, name, detail = '') {
  const div = document.createElement('div');
  div.className = `result ${status}`;
  div.innerHTML =
    `<span class="badge">${status === 'pass' ? 'PASS' : 'FAIL'}</span>` +
    `<span class="msg">${name}</span>` +
    (detail ? `<span class="detail">${detail}</span>` : '');
  resultsEl.appendChild(div);
}

function expect(actual, message) {
  return {
    toBe(expected) {
      if (actual !== expected)
        throw new Error(`${message || ''} → 期待値 ${JSON.stringify(expected)}、実際 ${JSON.stringify(actual)}`);
    },
    toBeGreaterThan(n) {
      if (!(actual > n)) throw new Error(`${message || ''} → ${actual} > ${n} が false`);
    },
    toBeLessThanOrEqual(n) {
      if (!(actual <= n)) throw new Error(`${message || ''} → ${actual} <= ${n} が false`);
    },
    toContain(item) {
      if (!actual.includes(item)) throw new Error(`${message || ''} → ${JSON.stringify(actual)} に ${item} が含まれない`);
    },
    toHaveLength(n) {
      if (actual.length !== n) throw new Error(`${message || ''} → 長さ ${actual.length}、期待 ${n}`);
    },
    toBeTrue() {
      if (actual !== true) throw new Error(`${message || ''} → true を期待したが ${actual}`);
    },
    toBeFalse() {
      if (actual !== false) throw new Error(`${message || ''} → false を期待したが ${actual}`);
    },
  };
}

// ============================================================
// ゲームロード後にテスト実行
// ============================================================
const frame = document.getElementById('game-frame');

frame.addEventListener('load', () => {
  // マップ画像のロードとinit()を待つ
  const checkReady = setInterval(() => {
    const g = frame.contentWindow;
    // hexEls が作成されていれば init 済み
    if (g && g.hexEls && g.hexEls.size > 0 && g.terrainFillEls && g.terrainFillEls.size > 0) {
      clearInterval(checkReady);
      document.getElementById('loading').style.display = 'none';
      runAllTests(g);
    }
  }, 100);
});

function runAllTests(g) {
  // ---- DOM副作用を抑制 ----
  g.addCombatLog   = () => {};
  g.renderCombatLog = () => {};
  g.drawAllUnits   = () => {};
  // applyHit は実際の hits/battleworn 更新のみ行い DOM描画をしない
  g.applyHit = function(unit) {
    if (!unit.battleworn) {
      unit.hits = (unit.hits ?? 0) + 1;
      if (unit.hits >= 3) { unit.battleworn = true; unit.hits = 0; }
    } else {
      unit.hits = (unit.hits ?? 0) + 1;
    }
  };

  // ---- テスト用ヘルパー ----
  const mkUnit = (overrides) => Object.assign({
    id: 'u', col: 10, row: 8, type: 'infantry', army: 'french',
    sp: 4, af: 0, er: 4, hits: 0, battleworn: false,
    isHeavyArtillery: false, isDetachment: false, small: false,
    imageHref: '',
  }, overrides);

  function setUnits(...arr) {
    g.units.length = 0;
    arr.forEach(u => g.units.push(mkUnit(u)));
  }

  function setTerrain(addr, types) { g.setTerrainTypes(addr, types); }
  function clearTerrain(addr)       { g.setTerrainTypes(addr, []); }
  function clearTerrains(...addrs)  { addrs.forEach(clearTerrain); }

  function setRiver(a, b) {
    if (!g.isRiverHexside(a, b)) g.toggleRiverHexside(a, b);
  }
  function clearRiver(a, b) {
    if (g.isRiverHexside(a, b)) g.toggleRiverHexside(a, b);
  }
  function resetRivers() {
    g.riverHexsides.length = 0;
    g.bridgeHexsides.length = 0;
  }

  // 各テスト前に地形・河川・ユニットをリセット
  function reset(...addrs) {
    addrs.forEach(clearTerrain);
    resetRivers();
    g.units.length = 0;
  }

  // ============================================================
  // 砲撃テスト
  // ============================================================

  section('砲撃 — ダイス数計算 (calcBombardmentDice)');

  test('①基本 AF=2、修正なし → ダイス2', () => {
    reset('1008', '1308');
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 });
    expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice').toBe(2);
  });

  test('②Plunging Fire（攻撃Ridge→目標Flat）→ AF+1 = 3', () => {
    reset('1008', '1308');
    setTerrain('1008', ['ridge']);
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 });
    expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice').toBe(3);
  });

  test('③攻撃がRidgeでも目標もRidgeならPlunging不発 → AF=2', () => {
    reset('1008', '1308');
    setTerrain('1008', ['ridge']);
    setTerrain('1308', ['ridge']);
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 });
    expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice').toBe(2);
  });

  test('④Canister（隣接=1ヘックス）→ AF+1 = 3（Desultory以外）', () => {
    reset('1008', '1108');
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 });
    expect(g.calcBombardmentDice(g.units[0], '1108'), 'dice').toBe(3);
  });

  test('⑤Desultory時はCanister不発（隣接でもAF÷2切り上げのみ）→ ceil(2/2)=1', () => {
    reset('1008', '1108');
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 });
    expect(g.calcBombardmentDice(g.units[0], '1108', { isDesultory: true }), 'dice').toBe(1);
  });

  test('⑥Desultory Fire → ceil(AF/2) = ceil(3/2) = 2', () => {
    reset('1008', '1308');
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:3, sp:0 });
    expect(g.calcBombardmentDice(g.units[0], '1308', { isDesultory: true }), 'dice').toBe(2);
  });

  test('⑦Target in Square 発動条件：目標Clear Infantry、隣接に自軍Cavalry → +1', () => {
    reset('1008', '1308', '1209');
    // 目標=Clear Infantry
    setUnits(
      { id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 },
      { id:'def', col:13, row:8, type:'infantry',  army:'allied',  af:1, sp:4, er:4 },
      { id:'cav', col:12, row:9, type:'HC',         army:'french', af:0, sp:4, er:5 }
    );
    // 隣接チェック: 1209は1308の隣か？距離1であることが必要
    const dist = g.hexDistance('1209', '1308');
    if (dist === 1) {
      expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice w/ in square').toBe(3);
    } else {
      // 隣接でなければボーナスなし（配置ミス）
      expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice w/o in square').toBe(2);
    }
  });

  test('⑧AF=0ユニット → ダイス0（砲撃不可）', () => {
    reset('1008', '1308');
    setUnits({ id:'atk', col:10, row:8, type:'infantry', army:'french', af:0, sp:4 });
    expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice').toBe(0);
  });

  test('⑨Disrupted Infantry (hits=2) → AF実効-1 → AF=2→1のダイス', () => {
    reset('1008', '1308');
    setUnits({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0, hits:2 });
    // getUnitStatus → disrupted → getEffectiveAF → af-1 = 1
    expect(g.getEffectiveAF(g.units[0]), 'effectiveAF').toBe(1);
    expect(g.calcBombardmentDice(g.units[0], '1308'), 'dice').toBe(1);
  });

  section('砲撃 — 目標数計算 (calcBombardmentTargetNumber)');

  test('①Clear地形 → TN=4', () => {
    reset('1308');
    const def = mkUnit({ id:'def', col:13, row:8, type:'infantry', army:'allied', sp:4, af:1, er:4 });
    expect(g.calcBombardmentTargetNumber('1308', def), 'TN').toBe(4);
  });

  test('②Woods → TN=5', () => {
    reset('1308');
    setTerrain('1308', ['woods']);
    const def = mkUnit({ id:'def', col:13, row:8, type:'infantry', army:'allied', sp:4, af:1, er:4 });
    expect(g.calcBombardmentTargetNumber('1308', def), 'TN').toBe(5);
  });

  test('③Buildings → TN=5', () => {
    reset('1308');
    setTerrain('1308', ['buildings']);
    const def = mkUnit({ id:'def', col:13, row:8, type:'infantry', army:'allied', sp:4, af:1, er:4 });
    expect(g.calcBombardmentTargetNumber('1308', def), 'TN').toBe(5);
  });

  test('④Walled Buildings → TN=6', () => {
    reset('1308');
    setTerrain('1308', ['walled_buildings']);
    const def = mkUnit({ id:'def', col:13, row:8, type:'infantry', army:'allied', sp:4, af:1, er:4 });
    expect(g.calcBombardmentTargetNumber('1308', def), 'TN').toBe(6);
  });

  test('⑤HC（Cavalry）→ TN-1 = 3', () => {
    reset('1308');
    const def = mkUnit({ id:'def', col:13, row:8, type:'HC', army:'allied', sp:4, af:0, er:5 });
    expect(g.calcBombardmentTargetNumber('1308', def), 'TN').toBe(3);
  });

  test('⑥LC（Cavalry）→ TN-1 = 3', () => {
    reset('1308');
    const def = mkUnit({ id:'def', col:13, row:8, type:'LC', army:'allied', sp:2, af:0, er:4 });
    expect(g.calcBombardmentTargetNumber('1308', def), 'TN').toBe(3);
  });

  section('砲撃 — 有効ターゲット判定 (getValidBombardmentTargets)');

  test('①射程内（3ヘックス以内）、LOS通視 → ターゲットリストに含まれる', () => {
    reset('1008', '1308');
    setUnits(
      { id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 },
      { id:'def', col:13, row:8, type:'infantry',  army:'allied',  af:1, sp:4, er:4 }
    );
    const targets = g.getValidBombardmentTargets(g.units[0]);
    expect(targets.length, 'targets count').toBe(1);
  });

  test('②AF=0 → ターゲットなし', () => {
    reset('1008', '1308');
    setUnits(
      { id:'atk', col:10, row:8, type:'infantry', army:'french', af:0, sp:4 },
      { id:'def', col:11, row:8, type:'infantry', army:'allied',  af:1, sp:4, er:4 }
    );
    const targets = g.getValidBombardmentTargets(g.units[0]);
    expect(targets.length, 'targets count').toBe(0);
  });

  test('③射程外（4ヘックス、重砲以外）→ ターゲットなし', () => {
    reset('1008', '1408');
    setUnits(
      { id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0, isHeavyArtillery: false },
      { id:'def', col:14, row:8, type:'infantry',  army:'allied',  af:1, sp:4, er:4 }
    );
    const targets = g.getValidBombardmentTargets(g.units[0]);
    expect(targets.length, 'targets count').toBe(0);
  });

  test('④重砲（HA）→ 射程4まで有効', () => {
    reset('1008', '1408');
    setUnits(
      { id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0, isHeavyArtillery: true },
      { id:'def', col:14, row:8, type:'infantry',  army:'allied',  af:1, sp:4, er:4 }
    );
    const targets = g.getValidBombardmentTargets(g.units[0]);
    expect(targets.length, 'HA range 4 target count').toBe(1);
  });

  test('⑤LOS遮断（平地→Ridge→平地）→ ターゲットなし', () => {
    reset('1008', '1208', '1408');
    setTerrain('1208', ['ridge']); // 中間にRidge
    setUnits(
      { id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0 },
      { id:'def', col:14, row:8, type:'infantry',  army:'allied',  af:1, sp:4, er:4, isHeavyArtillery: false }
    );
    // 攻撃側はHAなので射程4まで見える
    const atk = mkUnit({ id:'atk', col:10, row:8, type:'artillery', army:'french', af:2, sp:0, isHeavyArtillery: true });
    g.units[0] = Object.assign(g.units[0], { isHeavyArtillery: true });
    const targets = g.getValidBombardmentTargets(g.units[0]);
    expect(targets.length, 'LOS blocked → 0 targets').toBe(0);
  });

  section('砲撃 — 解決ロジック（成功/Partial/Hit計算）');

  test('①ダイス判定: >TN → success', () => {
    // TN=4: ダイス5 → success
    const rolls = [5, 5, 5]; const tn = 4;
    let s = 0, p = 0;
    for (const r of rolls) { if (r > tn) s++; else if (r === tn) p++; }
    s += Math.floor(p / 2);
    expect(s, 'successes from [5,5,5] TN4').toBe(3);
  });

  test('②ダイス判定: =TN → partial（2個で1成功）', () => {
    const rolls = [4, 4, 3]; const tn = 4;
    let s = 0, p = 0;
    for (const r of rolls) { if (r > tn) s++; else if (r === tn) p++; }
    s += Math.floor(p / 2);
    expect(s, 'successes from [4,4,3] TN4').toBe(1);
  });

  test('③Partial×1 → 0成功（Hit無し）', () => {
    const rolls = [4, 3, 2]; const tn = 4;
    let s = 0, p = 0;
    for (const r of rolls) { if (r > tn) s++; else if (r === tn) p++; }
    s += Math.floor(p / 2);
    expect(s, 'successes from [4,3,2] TN4 (1 partial)').toBe(0);
  });

  test('④複数Success → Hit は最大1のみ（resolveBombardment のhit判定）', () => {
    // resolveBombardment は successes >= 1 なら hit = true（1Hitのみ）
    // これをロジックで検証: successes=5 でも hit=1
    const successes = 5;
    const hit = successes >= 1; // ゲームの判定ロジック
    expect(hit, 'hit when successes=5').toBe(true);
    // 「2Hit適用」はされない = applyHitを1回だけ呼ぶことで保証
    // ここではロジックの方針を確認するのみ
  });

  test('⑤Detachment in WB: 6が2個必要 → 6×1なら0成功', () => {
    const rolls = [6, 5, 4]; // 6が1個
    const successes = Math.floor(rolls.filter(r => r === 6).length / 2);
    expect(successes, 'WB Detachment successes with one 6').toBe(0);
  });

  test('⑥Detachment in WB: 6が2個 → 1成功', () => {
    const rolls = [6, 6, 3];
    const successes = Math.floor(rolls.filter(r => r === 6).length / 2);
    expect(successes, 'WB Detachment successes with two 6s').toBe(1);
  });

  test('⑦Detachment in WB: 6が4個 → 2成功（でもHitは1）', () => {
    const rolls = [6, 6, 6, 6];
    const successes = Math.floor(rolls.filter(r => r === 6).length / 2);
    expect(successes, 'WB Detachment successes with four 6s').toBe(2);
    const hit = successes >= 1;
    expect(hit, 'hit capped at 1').toBeTrue();
  });

  // ============================================================
  // ユニットステータス & 有効値計算
  // ============================================================

  section('ユニットステータス (getUnitStatus / getEffectiveER / getEffectiveSP)');

  test('Fresh (hits=0) → status=fresh', () => {
    const u = mkUnit({ hits: 0, battleworn: false });
    expect(g.getUnitStatus(u), 'status').toBe('fresh');
  });

  test('1st Hit (hits=1) → status=shaken', () => {
    const u = mkUnit({ hits: 1, battleworn: false });
    expect(g.getUnitStatus(u), 'status').toBe('shaken');
  });

  test('2nd Hit (hits=2) → status=disrupted', () => {
    const u = mkUnit({ hits: 2, battleworn: false });
    expect(g.getUnitStatus(u), 'status').toBe('disrupted');
  });

  test('3rd Hit (hits=0, battleworn=true) → status=battleworn', () => {
    const u = mkUnit({ hits: 0, battleworn: true });
    expect(g.getUnitStatus(u), 'status').toBe('battleworn');
  });

  test('Battleworn + 1st Hit → status=shaken', () => {
    const u = mkUnit({ hits: 1, battleworn: true });
    expect(g.getUnitStatus(u), 'status').toBe('shaken');
  });

  test('Shaken ER -1（er=4 → effective=3）', () => {
    const u = mkUnit({ hits: 1, battleworn: false, er: 4 });
    expect(g.getEffectiveER(u), 'effectiveER').toBe(3);
  });

  test('Disrupted ER -1（er=4 → effective=3）', () => {
    const u = mkUnit({ hits: 2, battleworn: false, er: 4 });
    expect(g.getEffectiveER(u), 'effectiveER').toBe(3);
  });

  test('Fresh ER 変化なし（er=4 → 4）', () => {
    const u = mkUnit({ hits: 0, battleworn: false, er: 4 });
    expect(g.getEffectiveER(u), 'effectiveER').toBe(4);
  });

  test('ER下限は1（er=2, Shaken → effectiveER=1）', () => {
    const u = mkUnit({ hits: 1, battleworn: false, er: 2 });
    expect(g.getEffectiveER(u), 'effectiveER').toBe(1);
  });

  test('getEffectiveSP: Disrupted → SP-1（sp=4 → 3）', () => {
    const u = mkUnit({ hits: 2, battleworn: false, sp: 4 });
    expect(g.getEffectiveSP(u), 'effectiveSP').toBe(3);
  });

  test('getEffectiveSP: Fresh → SP変化なし', () => {
    const u = mkUnit({ hits: 0, battleworn: false, sp: 4 });
    expect(g.getEffectiveSP(u), 'effectiveSP').toBe(4);
  });

  // ============================================================
  // applyHit
  // ============================================================

  section('applyHit — ステップロス');

  test('①1st Hit: hits 0→1、battleworn変化なし', () => {
    const u = mkUnit({ hits: 0, battleworn: false });
    g.applyHit(u);
    expect(u.hits, 'hits').toBe(1);
    expect(u.battleworn, 'battleworn').toBeFalse();
  });

  test('②2nd Hit: hits 1→2', () => {
    const u = mkUnit({ hits: 1, battleworn: false });
    g.applyHit(u);
    expect(u.hits, 'hits').toBe(2);
  });

  test('③3rd Hit: Fresh面からBattlewornに転換（hits→0, battleworn→true）', () => {
    const u = mkUnit({ hits: 2, battleworn: false });
    g.applyHit(u);
    expect(u.battleworn, 'battleworn').toBeTrue();
    expect(u.hits, 'hits after flip').toBe(0);
  });

  test('④Battleworn面の1st Hit: hits 0→1', () => {
    const u = mkUnit({ hits: 0, battleworn: true });
    g.applyHit(u);
    expect(u.hits, 'hits').toBe(1);
    expect(u.battleworn, 'still battleworn').toBeTrue();
  });

  // ============================================================
  // 近接戦闘 — 攻撃可能判定
  // ============================================================

  section('近接戦闘 — 攻撃可能判定 (getValidCloseCombatTargets)');

  test('①Infantry 隣接の敵 → ターゲット1体', () => {
    reset('1008', '1108');
    setUnits(
      { id:'atk', col:10, row:8, type:'infantry', army:'french', sp:4, af:1, er:4 },
      { id:'def', col:11, row:8, type:'infantry', army:'allied',  sp:4, af:1, er:4 }
    );
    const targets = g.getValidCloseCombatTargets(g.units[0]);
    expect(targets.length, 'adjacent infantry target').toBe(1);
  });

  test('②Infantry 2ヘックス先の敵 → ターゲット0体', () => {
    reset('1008', '1208');
    setUnits(
      { id:'atk', col:10, row:8, type:'infantry', army:'french', sp:4, af:1, er:4 },

  test('③Enfilade: 隣接友軍1体 → SP+1 = 5ダイス', () => {
    reset('1008', '1108', '1008'); // 1109は1108の隣か確認後に調整
    // 1108の隣ヘックスに友軍を配置
    // neighborAddrs('1108')で隣を確認
    const neighbors = g.neighborAddrs('1108');
    const enfiladeAddr = neighbors.find(a => a !== '1008');
    if (!enfiladeAddr) { test.skip = true; return; }
    const enCol = parseInt(enfiladeAddr.slice(0,2), 10);
    const enRow = parseInt(enfiladeAddr.slice(2), 10);
    setUnits(
      { id:'atk',     col:10,   row:8,    type:'infantry', army:'french', sp:4, af:1, er:4 },
      { id:'def',     col:11,   row:8,    type:'infantry', army:'allied',  sp:4, af:1, er:4 },
      { id:'enfilade',col:enCol,row:enRow, type:'infantry', army:'french', sp:4, af:1, er:4 }
    );
    const atk = g.units[0], def = g.units[1];
    expect(g.calcMeleeAttackerDice(atk, def, '1008', '1108'), 'enfilade +1').toBe(5);
  });

  section('近接戦闘 — ダイス解決 (rollMeleeDice)');

  test('①全成功（>TN）: [5,5,5] TN=4 → 3成功', () => {
    // rollMeleeDiceはランダムなので、ここではロジックを直接検証
    // 同等の処理を手動で計算
    const rolls = [5, 5, 5]; const tn = 4;
    let s = 0, p = 0;
    for (const r of rolls) { if (r > tn) s++; else if (r === tn) p++; }
    s += Math.floor(p / 2);
    expect(s, 'all success').toBe(3);
  });

  test('②Partial×2 → 1成功: [4,4,3] TN=4', () => {

  section('後退 (doRetreat)');

  test('①French は南方向（row増加）に後退', () => {
    reset('1008', '1108', '1208');
    setUnits(
      { id:'atk', col:10, row:8, type:'infantry', army:'french', sp:4, af:1, er:4 },
      { id:'def', col:10, row:8, type:'infantry', army:'allied',  sp:4, af:1, er:4 }
    );
    // フランスユニットを1体配置して後退させる
    const unit = mkUnit({ id:'fr', col:10, row:8, type:'infantry', army:'french', sp:4, af:1, er:4 });
    g.units.length = 0;
    g.units.push(unit);
    const initialRow = unit.row;
    g.doRetreat(unit, 1);
    // 後退後はrow >= initialRow（南方向）
    expect(unit.row >= initialRow, 'french retreats south (row increases)').toBeTrue();
  });

  test('②Allied は北方向（row減少）に後退', () => {
    reset('1008', '1108');
    const unit = mkUnit({ id:'al', col:10, row:8, type:'infantry', army:'allied', sp:4, af:1, er:4 });
    g.units.length = 0;
    g.units.push(unit);
    const initialRow = unit.row;
    g.doRetreat(unit, 1);
    expect(unit.row <= initialRow, 'allied retreats north (row decreases)').toBeTrue();
  });

  test('③後退後はユニット位置が変わる（1ヘックス）', () => {
    reset('1008', '1108', '1009');
    const unit = mkUnit({ id:'fr', col:10, row:8, type:'infantry', army:'french', sp:4, af:1, er:4 });
    g.units.length = 0;
    g.units.push(unit);
    const beforeAddr = g.hexAddr(unit.col, unit.row);
    g.doRetreat(unit, 1);
    const afterAddr = g.hexAddr(unit.col, unit.row);
    expect(beforeAddr !== afterAddr, 'unit moved after retreat').toBeTrue();
  });

  test('④後退不能（全周を敵で囲む）→ 1Hit 適用', () => {
    reset('1108');
    // 中央ユニット
    const unit = mkUnit({ id:'fr', col:11, row:8, type:'infantry', army:'french', sp:4, af:1, er:4, hits:0 });
    // 全隣接に敵を配置
    g.units.length = 0;
    g.units.push(unit);
    const neighbors = g.neighborAddrs('1108');
    for (const [i, nAddr] of neighbors.entries()) {
      const c = parseInt(nAddr.slice(0,2), 10);
      const r = parseInt(nAddr.slice(2), 10);
      g.units.push(mkUnit({ id:`enemy${i}`, col:c, row:r, type:'infantry', army:'allied', sp:4, af:1, er:4 }));
    }
    const hitsBefore = unit.hits;
    g.doRetreat(unit, 1);
    expect(unit.hits > hitsBefore, 'hit applied when retreat blocked').toBeTrue();
  });

  test('⑤後退中に敵隣接ヘックス通過 → 1Hit追加（友軍なし）', () => {
    // 後退先の隣に敵を配置（友軍なし）
    reset('1008', '1009', '1109');
    const unit = mkUnit({ id:'fr', col:10, row:8, type:'infantry', army:'french', sp:4, af:1, er:4, hits:0 });
    g.units.length = 0;
    g.units.push(unit);
    // 後退先（1009など）の隣に敵を置く
    const retreatNeighbors = g.neighborAddrs('1108'); // 後退後のヘックスの隣
    if (retreatNeighbors.length > 0) {
      const enemyAddr = retreatNeighbors[0];
      const ec = parseInt(enemyAddr.slice(0,2), 10);
      const er = parseInt(enemyAddr.slice(2), 10);
      g.units.push(mkUnit({ id:'e1', col:ec, row:er, type:'infantry', army:'allied', sp:4, af:1, er:4 }));
    }
    // 後退1ヘックス（後退先が敵隣接の場合+1Hit）
    const hitsBefore = unit.hits;
    g.doRetreat(unit, 1);
    // hitが増えているか、または位置が変わっているかを確認（状況依存）
    expect(unit.hits >= hitsBefore, 'hits did not decrease').toBeTrue();
  });
